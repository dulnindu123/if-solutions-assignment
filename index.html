<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kngu Flower Shop - Fresh flowers, bouquets and arrangements for every occasion.">
  <title>Kngu. | Fresh Flowers &amp; Bouquets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- TOP ANNOUNCEMENT BAR -->
  <div class="announcement-bar" id="announcement-bar">
    <p>All featured product 50% off Shop Now</p>
    <button class="announcement-close" id="announcement-close" aria-label="Close">&times;</button>
  </div>

  <!-- HEADER -->
  <header class="site-header" id="main-header">
    <div class="container">
      <a class="logo" href="#" id="brand-logo">
        <span class="logo-icon"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="3"/><path d="M50 25c-5 0-10 3-13 8-2-1-5-2-8-1-4 1-7 5-7 9 0 4 2 7 5 9-2 3-3 6-2 10 1 4 5 7 9 7h1c1 4 5 6 9 7v-6c0-2 1-3 3-3h6c2 0 3 1 3 3v6c4-1 8-3 9-7h1c4 0 8-3 9-7 1-4 0-7-2-10 3-2 5-5 5-9 0-4-3-8-7-9-3-1-6 0-8 1-3-5-8-8-13-8z" fill="currentColor" opacity="0.2"/><circle cx="50" cy="50" r="10" fill="none" stroke="currentColor" stroke-width="2"/></svg></span>
        Kngu.
      </a>
      <button class="mobile-toggle" id="mobile-menu-toggle" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
      <nav class="main-nav" id="main-nav">
        <a href="#" class="active" id="nav-home">HOME</a>
        <a href="#" id="nav-shop">SHOP <i class="fas fa-chevron-down nav-arrow"></i></a>
        <a href="#" id="nav-blog">BLOG <i class="fas fa-chevron-down nav-arrow"></i></a>
        <a href="#" id="nav-pages">PAGES <i class="fas fa-chevron-down nav-arrow"></i></a>
        <a href="#" id="nav-contact">CONTACT</a>
      </nav>
      <div class="header-right">
        <div class="header-search">
          <input type="text" placeholder="Search our store" id="header-search-input">
        </div>
        <div class="header-icons">
          <a href="#" id="icon-search" aria-label="Search"><i class="fas fa-search"></i></a>
          <a href="#" id="icon-user" aria-label="Account"><i class="far fa-user"></i></a>
          <a href="#" id="icon-cart" aria-label="Cart" class="cart-link">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge">3</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="hero">
    <div class="container hero-container">
      <div class="hero-inner">
        <div class="hero-offer">
          <span class="offer-line"></span>
          <span class="offer-text">20% Off For<br>New Members</span>
        </div>
        <h1>HAPPY MOTHER'S DAY!</h1>
        <p class="hero-tagline">Bouquets your mom will love!</p>
        <a href="#" class="btn-shop btn-rounded" id="hero-cta">START SHOPPING</a>
      </div>
    </div>
    <button class="hero-arrow hero-arrow-left" aria-label="Previous"><i class="fas fa-chevron-left"></i></button>
    <button class="hero-arrow hero-arrow-right" aria-label="Next"><i class="fas fa-chevron-right"></i></button>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('announcement-close').addEventListener('click', function() {
      document.getElementById('announcement-bar').style.display = 'none';
    });
  </script>
</body>
</html>
